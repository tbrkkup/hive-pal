services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - hive-pal
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/beekeeper}
      PROMETHEUS_API_KEY: ${PROMETHEUS_API_KEY:-prometheus-secret-token}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_REJECT_UNAUTHORIZED: ${SMTP_REJECT_UNAUTHORIZED}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      FROM_EMAIL: noreply@hivepal.app
      FRONTEND_URL: ${FRONTEND_URL:-https://preview.hivepal.app}
      # Storage Configuration
      STORAGE_TYPE: ${STORAGE_TYPE:-s3}
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-/data/uploads}
      # S3 Storage (for audio recordings)
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      AUDIO_MAX_FILE_SIZE: ${AUDIO_MAX_FILE_SIZE:-52428800}
      # HiveScale was renamed to HiveHub. The backend prefers HIVEHUB_* and
      # falls back to the legacy HIVESCALE_* names, so either set works.
      HIVEHUB_API_BASE_URL: ${HIVEHUB_API_BASE_URL:-}
      HIVEHUB_SERVICE_API_KEY: ${HIVEHUB_SERVICE_API_KEY:-}
      HIVESCALE_API_BASE_URL: ${HIVESCALE_API_BASE_URL:-}
      HIVESCALE_SERVICE_API_KEY: ${HIVESCALE_SERVICE_API_KEY:-}
    volumes:
      - hivepal_uploads:/data/uploads
    depends_on:
      - postgres

  postgres:
    image: postgres:14
    ports:
      - 6543:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-beekeeper}
    volumes:
      - hivepal_postgres_data_preview:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres -d beekeeper' ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hivepal_uploads:
  hivepal_postgres_data_preview:
